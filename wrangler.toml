name = "freegamestore-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
API_BASE = "https://admin.freegamestore.online"
GITHUB_ORG = "freegamestore-online"
AGENT_BASE = "https://agent.freegamestore.online"
LEADERBOARD_BASE = "https://freegamestore-leaderboard.serge-the-dev.workers.dev"

[[routes]]
pattern = "mcp.freegamestore.online/*"
zone_name = "freegamestore.online"

# Secrets (set via `wrangler secret put`):
#   GITHUB_TOKEN          — org-level PAT for repo read/write
#   GITHUB_CLIENT_ID      — GitHub OAuth app for MCP auth
#   GITHUB_CLIENT_SECRET  — GitHub OAuth app secret
#   SESSION_SIGNING_KEY   — same key as fgs/admin for session verification

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "c649c4239dbd4250bc1e6507cfb8be14"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "FgsMcpAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FgsMcpAgent"]
